spring:
  config:
    activate:
      on-profile: prod

  cloud:
    gateway:
      # Cấu hình CORS global để Frontend (ví dụ: React/Angular/Vue) có thể gọi API mà không bị lỗi mạng
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*" # Môi trường local cho phép tất cả. Lên Production nhớ đổi thành domain thật.
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"

      # Cấu hình Routing theo đúng chuẩn EFMS Architecture
      routes:
        # 1. Route cho Identity Service
        - id: efms-identity-service
          uri: ${IDENTITY_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/identity/**
          filters:
            # Gọt bỏ /api/identity/, chỉ giữ lại đoạn đằng sau (VD: biến thành /auth/login)
            - RewritePath=/api/identity/(?<segment>.*), /$\{segment}

        # 2. Route cho Core Service
        - id: efms-core-service
          uri: ${CORE_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/core/**
          filters:
            # Tương tự cho Core Service
            - RewritePath=/api/core/(?<segment>.*), /$\{segment}

        # 3. Route cho Common Service
        - id: efms-common-service
          uri: ${COMMON_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/common/**
          filters:
            # Tương tự cho Common Service
            - RewritePath=/api/common/(?<segment>.*), /$\{segment}

server:
  port: ${PORT:8080}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n"
  level:
    # Bật log ở mức DEBUG cho gateway để dễ dàng theo dõi request/response khi code local
    org.springframework.cloud.gateway: DEBUG

# Cấu hình biến môi trường tùy chỉnh cho bảo mật
application:
  security:
    jwt:
      # Ưu tiên JWT_SECRET, nếu không có dùng JWT_SECRET_KEY, cuối cùng mới dùng default
      secret-key: ${JWT_SECRET:${JWT_SECRET_KEY:"dGhpcy1pcy1hLXN1cGVyLXNlY3JldC1rZXktdGhhdC1tdXN0LWJlLWF0LWxlYXN0LTI1Ni1iaXRzLWxvbmc="}}